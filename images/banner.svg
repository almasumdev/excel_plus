<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="excel_plus — fast, low-memory Excel (.xlsx) library for Dart and Flutter">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c6b46"/>
      <stop offset="1" stop-color="#0e3a26"/>
    </linearGradient>
    <linearGradient id="sheet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f5ee"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" rx="20" fill="url(#bg)"/>

  <!-- spreadsheet icon -->
  <g transform="translate(80 86)">
    <rect x="0" y="0" width="168" height="168" rx="14" fill="url(#sheet)"/>
    <rect x="0" y="0" width="168" height="40" rx="14" fill="#21a366"/>
    <rect x="0" y="26" width="168" height="14" fill="#21a366"/>
    <!-- grid lines -->
    <g stroke="#bcd9c8" stroke-width="2">
      <line x1="0" y1="82" x2="168" y2="82"/>
      <line x1="0" y1="125" x2="168" y2="125"/>
      <line x1="56" y1="40" x2="56" y2="168"/>
      <line x1="112" y1="40" x2="112" y2="168"/>
    </g>
    <!-- a couple of filled cells -->
    <rect x="2" y="42" width="54" height="40" fill="#d7efe1"/>
    <rect x="112" y="125" width="54" height="41" fill="#c8e9d7"/>
    <text x="84" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">XLSX</text>
  </g>

  <!-- wordmark -->
  <text x="296" y="166" font-family="Segoe UI, Arial, sans-serif" font-size="92" font-weight="800" fill="#ffffff">excel_plus</text>
  <!-- tagline -->
  <text x="300" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#cdeada">Fast, low-memory Excel (.xlsx) for Dart &amp; Flutter</text>

  <!-- feature chips -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">
    <g transform="translate(300 250)">
      <rect width="116" height="44" rx="22" fill="#ffffff" fill-opacity="0.12"/>
      <text x="58" y="29" fill="#eafff3" text-anchor="middle">Read</text>
    </g>
    <g transform="translate(428 250)">
      <rect width="126" height="44" rx="22" fill="#ffffff" fill-opacity="0.12"/>
      <text x="63" y="29" fill="#eafff3" text-anchor="middle">Create</text>
    </g>
    <g transform="translate(566 250)">
      <rect width="100" height="44" rx="22" fill="#ffffff" fill-opacity="0.12"/>
      <text x="50" y="29" fill="#eafff3" text-anchor="middle">Edit</text>
    </g>
    <g transform="translate(678 250)">
      <rect width="118" height="44" rx="22" fill="#ffffff" fill-opacity="0.12"/>
      <text x="59" y="29" fill="#eafff3" text-anchor="middle">Style</text>
    </g>
  </g>
</svg>
