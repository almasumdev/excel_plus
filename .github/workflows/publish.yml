name: Publish

# Publishing happens on a tag only. The CI & Release workflow creates the
# v<version> tag after checks, the pana gate and a successful web deploy, and
# that tag push triggers this workflow.
on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write # pub.dev OIDC automated publishing
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart pub publish --force
