name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # pub.dev OIDC automated publishing
    steps:
      - uses: actions/checkout@v5

      # pub resolves example/ too, which needs flutter_test from the Flutter
      # SDK, so a Dart-only setup fails here. flutter ships dart as well.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: dart-lang/setup-dart@v1 # configures pub.dev OIDC credentials

      - run: flutter pub publish --force
