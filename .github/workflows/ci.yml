name: CI & Release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Format, analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Package — install
        run: dart pub get

      - name: Package — format
        run: dart format --output=none --set-exit-if-changed .

      - name: Package — analyze
        run: dart analyze

      - name: Package — test
        run: dart test

      - name: Example — install, analyze & test
        working-directory: example
        run: |
          flutter pub get
          flutter analyze
          flutter test

  web-compile:
    name: Web compile gate (js + wasm)
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: dart pub get

      - name: Compile with dart2js
        run: dart compile js tool/web_smoke.dart -o "$RUNNER_TEMP/smoke.js"

      - name: Compile with wasm
        run: dart compile wasm tool/web_smoke.dart -o "$RUNNER_TEMP/smoke.wasm"

  pana:
    name: Pana score gate
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: dart pub get

      # pana validates the pubspec `screenshots` (logo.png) and needs the webp
      # tools (gif2webp / cwebp) to do so.
      - name: Install screenshot tools (webp)
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - name: Require >= 160 pub points
        run: |
          dart pub global activate pana
          dart pub global run pana --json > pana.json 2> pana.err || true
          POINTS=$(jq -r '.scores.grantedPoints // empty' pana.json)
          MAX=$(jq -r '.scores.maxPoints // empty' pana.json)
          echo "Pana score: ${POINTS:-?}/${MAX:-?}"
          if [ -z "$POINTS" ]; then
            echo "::error::Could not read pana score."; tail -n 50 pana.err; exit 1
          fi
          if [ "$POINTS" -lt 160 ]; then
            echo "::error::pana $POINTS/$MAX is below the required 160 — aborting."; exit 1
          fi

  version:
    name: Resolve version
    needs: [pana, web-compile]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_new: ${{ steps.v.outputs.is_new }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: v
        name: Is this a new version?
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "is_new=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is already tagged — nothing to release."
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is new — will deploy, tag, then publish."
          fi

  deploy-web:
    name: Deploy example to Firebase Hosting
    needs: version
    if: needs.version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build example web app
        working-directory: example
        run: |
          flutter pub get
          flutter build web --release --base-href /

      - name: Deploy to Firebase Hosting (masum-excel.web.app)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          set +e
          out=$(npx --yes firebase-tools@latest deploy \
            --only hosting --project my-pub-packages --non-interactive 2>&1)
          code=$?
          printf '%s\n' "$out"
          if [ "$code" -ne 0 ] && printf '%s' "$out" | grep -q "is the current active version"; then
            echo "Site already serves this build; treating as success."
            exit 0
          fi
          exit "$code"

  # Push the tag with a PAT so it triggers the Publish workflow — a default
  # GITHUB_TOKEN push would not.
  tag:
    name: Tag release
    needs: [version]
    if: needs.version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0
          fetch-tags: true

      - name: Create & push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"
