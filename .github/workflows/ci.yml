name: CI & Release

# Sequential pipeline:
#   checks (format/analyze/test, package + example)
#     -> pana score gate (>= 160)
#       -> [pull request stops here]
#       -> [push to main] resolve version -> if new: deploy web -> tag
#          (the tag then triggers the separate Publish workflow)
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

# Opt in to Node.js 24 for all JavaScript actions (checkout, flutter-action,
# setup-dart, firebase deploy) ahead of the Node 20 deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1) Checks ŌĆö must pass for every PR and push.
  checks:
    name: Format, analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Package ŌĆö install
        run: dart pub get

      - name: Package ŌĆö format
        run: dart format --output=none --set-exit-if-changed .

      - name: Package ŌĆö analyze
        run: dart analyze

      - name: Package ŌĆö test
        run: dart test

      - name: Example ŌĆö install, analyze & test
        working-directory: example
        run: |
          flutter pub get
          flutter analyze
          flutter test

  # 2) Pana score gate ŌĆö runs only after checks pass.
  pana:
    name: Pana score gate
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: dart pub get

      # pana validates the pubspec `screenshots` (logo.png) and needs the webp
      # tools (gif2webp / cwebp) to do so.
      - name: Install screenshot tools (webp)
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - name: Require >= 160 pub points
        run: |
          dart pub global activate pana
          dart pub global run pana --json > pana.json 2> pana.err || true
          POINTS=$(jq -r '.scores.grantedPoints // empty' pana.json)
          MAX=$(jq -r '.scores.maxPoints // empty' pana.json)
          echo "Pana score: ${POINTS:-?}/${MAX:-?}"
          if [ -z "$POINTS" ]; then
            echo "::error::Could not read pana score."; tail -n 50 pana.err; exit 1
          fi
          if [ "$POINTS" -lt 160 ]; then
            echo "::error::pana $POINTS/$MAX is below the required 160 ŌĆö aborting."; exit 1
          fi

  # 3) Resolve the version ŌĆö push/manual only (a PR ends after the gate above).
  version:
    name: Resolve version
    needs: pana
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_new: ${{ steps.v.outputs.is_new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: v
        name: Is this a new version?
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "is_new=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is already tagged ŌĆö nothing to release."
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is new ŌĆö will deploy, tag, then publish."
          fi

  # 4) Deploy the example web app ŌĆö only when the version is new.
  deploy-web:
    name: Deploy example to Firebase Hosting
    needs: version
    if: needs.version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build example web app
        working-directory: example
        run: |
          flutter pub get
          flutter build web --release --base-href /

      - name: Deploy to Firebase Hosting (masum-excel.web.app)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: my-pub-packages
          target: masum-excel
          disableComment: true # main-branch deploy has no PR to comment on

  # 5) Tag the release only after the web deploy succeeds. Pushed with a PAT so
  #    the tag triggers the Publish workflow (a GITHUB_TOKEN push would not).
  tag:
    name: Tag release
    needs: [version, deploy-web]
    if: needs.version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0
          fetch-tags: true

      - name: Create & push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"
