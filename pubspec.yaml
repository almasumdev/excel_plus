name: excel_plus
description: Fast, low-memory Excel (.xlsx) library for Dart and Flutter to read, create, edit, and style spreadsheets. A drop-in replacement for the excel package.
version: 0.0.5
homepage: https://github.com/almasumdev/excel_plus
repository: https://github.com/almasumdev/excel_plus
issue_tracker: https://github.com/almasumdev/excel_plus/issues
topics:
  - excel
  - xlsx
  - spreadsheet
  - flutter
  - dart
screenshots:
  - description: The excel_plus logo.
    path: images/logo.png

environment:
  sdk: ^3.11.4

dependencies:
  archive: ^4.0.9
  xml: ^7.0.1
  web: ^1.1.1

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
